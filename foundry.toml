[profile.default]
src = "contracts"
out = "foundry-out"
libs = ["node_modules", "lib"]
test = "test"
remappings = ["@openzeppelin/=node_modules/@openzeppelin/"]
solc_version = "0.8.20"
via_ir = true
optimizer = true
optimizer_runs = 200

[fuzz]
runs = 10000
max_test_rejects = 65536
seed = "0xdeadbeef"
